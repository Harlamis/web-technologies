<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Weather widget</title>
  </head>
  <body>
    <main>
      <div class="weather-container">
        <div class="current-selection">
          <h1 class="accent-text">New York, NY</h1>
          <span class="date sub-text">Tuesday, April 15th</span>
          <span class="sub-text"></span>
          <div class="forecast">
            <img src="" alt="" />
            <h2>58 <span>°F</span></h2>
            <div class="stats">
              <ul>
                <li><span class="sub-text"></span><span class="accent-text"></span></li>
                <li><span class="sub-text"></span><span class="accent-text"></span></li>
                <li><span class="sub-text"></span><span class="accent-text"></span></li>
                <li><span class="sub-text"></span><span class="accent-text"></span></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
