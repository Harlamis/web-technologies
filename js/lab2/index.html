<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="wrapper">
      <h1>Enter Number</h1>
      <div class="container">
        <input type="number" id="low-range" />
        <span><</span>
        <input type="number" name="number" id="number" />
        <span><</span>
        <input type="number" id="upper-range" />
      </div>
      <input type="button" value="Check range" id="btn" />
      <h2>Enter the number in range!</h2>
    </div>
    <div class="grade-container">
      <input type="number" name="" id="grade-input" placeholder="Enter grade" />
      <h2 id="grade-display">Your grade will be here</h2>
    </div>
    <div class="season-container">
      <h2>Enter month</h2>
      <select id="month-input">
        <option value="">--Select month--</option>
        <option value="1">January</option>
        <option value="2">February</option>
        <option value="3">March</option>
        <option value="4">April</option>
        <option value="5">May</option>
        <option value="6">June</option>
        <option value="7">July</option>
        <option value="8">August</option>
        <option value="9">September</option>
        <option value="10">October</option>
        <option value="11">November</option>
        <option value="12">December</option>
      </select>
      <h3 id="season-display">Season will be here</h3>
    </div>
    <script src="script.js"></script>
  </body>
</html>
