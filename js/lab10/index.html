<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Friends Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="auth-screen">
      <div class="auth-box">
        <div id="login-container">
          <h2>Вхід у систему</h2>
          <form id="login-form">
            <input type="text" name="username" placeholder="Введіть ім'я..." required />
            <input type="password" name="password" placeholder="Введіть пароль..." required />
            <div id="login-error" class="error-text hidden"></div>
            <button type="submit">Увійти</button>
          </form>
          <p class="toggle-auth">Немає акаунту? <a href="#" id="show-register">Зареєструватися</a></p>
        </div>

        <div id="register-container" class="hidden">
          <h2>Реєстрація</h2>
          <form id="register-form">
            <input type="text" name="username" placeholder="Придумайте ім'я..." required />
            <input type="password" name="password" placeholder="Придумайте пароль..." required />
            <div id="register-error" class="error-text hidden"></div>
            <button type="submit">Зареєструватися</button>
          </form>
          <p class="toggle-auth">Вже є акаунт? <a href="#" id="show-login">Увійти</a></p>
        </div>
      </div>
    </div>

    <div id="app-screen" class="hidden">
      <aside class="sidebar">
        <h2 style="margin-bottom: 20px">Привіт, <span id="user-display"></span>!</h2>

        <div class="filter-group">
          <h3>Пошук за ім'ям</h3>
          <input type="search" id="search-input" placeholder="Наприклад, John..." />
        </div>

        <div class="filter-group">
          <h3>Сортування</h3>
          <div class="flex-row">
            <button class="btn-small sort-btn" data-sort="name-asc">Ім'я A-Z</button>
            <button class="btn-small sort-btn" data-sort="name-desc">Ім'я Z-A</button>
            <button class="btn-small sort-btn" data-sort="age-asc">Вік ⬆</button>
            <button class="btn-small sort-btn" data-sort="age-desc">Вік ⬇</button>
          </div>
        </div>

        <div class="filter-group">
          <h3>Стать</h3>
          <label><input type="radio" name="gender" value="all" checked /> Всі</label>
          <label><input type="radio" name="gender" value="male" /> Чоловіки</label>
          <label><input type="radio" name="gender" value="female" /> Жінки</label>
        </div>

        <button class="reset-btn" id="reset-filters">Скинути фільтри</button>
        <button class="logout-btn" id="logout-btn">Вийти</button>
      </aside>

      <main class="main-content">
        <div id="error-msg" class="hidden"></div>
        <div class="top-bar">
          <h2>Знайдені друзі: <span id="results-count">0</span></h2>
        </div>

        <div class="cards-grid" id="cards-container"></div>

        <div class="pagination" id="pagination-container"></div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
